name: QA Test Run

on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket (e.g., SD-3309)'
        required: true
        type: string
      pr_number:
        description: 'PR number in BE repo (optional)'
        required: false
        type: string
      scope:
        description: 'Test scope'
        required: true
        type: choice
        options:
          - changed_only
          - changed_and_related
          - full_regression

jobs:
  qa-agent:
    name: "QA Agent (Generate + Execute + Report)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Checkout BE repo
        uses: actions/checkout@v4
        with:
          repository: Satu-Dental-Repository/Satu-Dental-CMS-BE
          token: ${{ secrets.BE_REPO_TOKEN }}
          path: be-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Fetch Jira ticket context
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python scripts/fetch_jira_context.py ${{ inputs.jira_ticket }}

      - name: Setup Node.js (for Claude Code)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run QA Agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_READER_EMAIL: ${{ secrets.QA_READER_EMAIL }}
          QA_READER_PASSWORD: ${{ secrets.QA_READER_PASSWORD }}
          QA_NOPERM_EMAIL: ${{ secrets.QA_NOPERM_EMAIL }}
          QA_NOPERM_PASSWORD: ${{ secrets.QA_NOPERM_PASSWORD }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          claude -p "You are a QA engineer for Satu Dental. Your job is to test API endpoints
          and produce DETAILED evidence reports.

          INPUTS:
          - Jira ticket: ${{ inputs.jira_ticket }}
          - PR: ${{ inputs.pr_number }}
          - Scope: ${{ inputs.scope }}
          - Staging URL: available as \$STAGING_BASE_URL env var
          - Admin credentials: \$QA_ADMIN_EMAIL and \$QA_ADMIN_PASSWORD env vars

          Read CLAUDE.md FIRST — it contains your complete workflow (Steps 1-5),
          strict formatting rules, and the quality checklist you must follow.

          Read templates/report-template.md — this is the EXACT format your report must follow.

          CRITICAL RULES:
          - Every test case MUST show the full request body JSON you sent
          - Every test case MUST show the full HTTP response (status code + body)
          - NEVER write just 'PASS' or '200 OK' — always include the actual response JSON
          - Log all prerequisite requests and responses
          - Document all test fixtures (IDs, names, states)
          - If a request fails unexpectedly, read the error and fix it
          - Write the report to results/${{ inputs.jira_ticket }}-test-cases.md

          After writing the report, run:
          python scripts/post_confluence_report.py ${{ inputs.jira_ticket }} results/${{ inputs.jira_ticket }}-test-cases.md --sprint SD-26-4-1
          python scripts/post_jira_comment.py ${{ inputs.jira_ticket }} results/${{ inputs.jira_ticket }}-results.json" \
          --allowedTools Bash,Read,Write,Glob,Grep \
          --max-turns 80

      - name: Upload test cases artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-cases
          path: test_cases/${{ inputs.jira_ticket }}.yaml
          if-no-files-found: ignore

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            results/*.md
            results/*.json
          if-no-files-found: ignore

      - name: Upload Jira context artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jira-context
          path: jira_context/
          if-no-files-found: ignore

      - name: Commit results to repo
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "QA Bot"
          git config user.email "qa-bot@satudental.com"
          git add test_cases/ results/ || true
          git commit -m "QA: ${{ inputs.jira_ticket }} - ${DATE}" || echo "No changes to commit"
          git push || echo "Push failed"
