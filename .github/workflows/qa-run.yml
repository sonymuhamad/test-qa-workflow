name: QA Test Run

on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket (e.g., SD-3309)'
        required: true
        type: string
      pr_number:
        description: 'PR number in BE repo (optional)'
        required: false
        type: string
      scope:
        description: 'Test scope'
        required: true
        type: choice
        options:
          - changed_only
          - changed_and_related
          - full_regression

jobs:
  qa-agent:
    name: "QA Agent (Generate + Execute + Report)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Checkout BE repo
        uses: actions/checkout@v4
        with:
          repository: Satu-Dental-Repository/Satu-Dental-CMS-BE
          token: ${{ secrets.BE_REPO_TOKEN }}
          path: be-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Fetch Jira ticket context
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python scripts/fetch_jira_context.py ${{ inputs.jira_ticket }}

      - name: Setup Node.js (for Claude Code)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run QA Agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_READER_EMAIL: ${{ secrets.QA_READER_EMAIL }}
          QA_READER_PASSWORD: ${{ secrets.QA_READER_PASSWORD }}
          QA_NOPERM_EMAIL: ${{ secrets.QA_NOPERM_EMAIL }}
          QA_NOPERM_PASSWORD: ${{ secrets.QA_NOPERM_PASSWORD }}
          SHEETS_WEBAPP_URL: ${{ secrets.SHEETS_WEBAPP_URL }}
          SHEETS_WEBAPP_TOKEN: ${{ secrets.SHEETS_WEBAPP_TOKEN }}
          QA_SPREADSHEET_ID: ${{ secrets.QA_SPREADSHEET_ID }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          claude -p "You are a QA agent for Satu Dental.

          INPUTS:
          - Jira ticket: ${{ inputs.jira_ticket }}
          - PR: ${{ inputs.pr_number }}
          - Scope: ${{ inputs.scope }}
          - Staging URL: available as \$STAGING_BASE_URL env var
          - Admin credentials: \$QA_ADMIN_EMAIL and \$QA_ADMIN_PASSWORD env vars

          Read CLAUDE.md for your full workflow instructions.
          Follow Steps 1-5 exactly:

          1. GATHER CONTEXT: Read CLAUDE.md, test_cases/_schema.yaml, example YAML,
             jira_context/${{ inputs.jira_ticket }}.md, and relevant BE repo files.

          2. GENERATE: Write test cases to test_cases/${{ inputs.jira_ticket }}.yaml

          3. EXECUTE: Login to staging, run prerequisites (fix errors if they fail),
             execute all test cases via curl, record results.

          4. WRITE RESULTS: Save to results/${{ inputs.jira_ticket }}-results.json

          5. REPORT: Run these commands:
             python scripts/upload_sheets.py results/${{ inputs.jira_ticket }}-results.json
             python scripts/post_jira_comment.py ${{ inputs.jira_ticket }} results/${{ inputs.jira_ticket }}-results.json

          IMPORTANT: Use curl for API calls. Read error responses and adapt.
          If a prerequisite fails with 400, read the error, fix the body, retry." \
          --allowedTools Bash,Read,Write,Glob,Grep \
          --max-turns 80

      - name: Upload test cases artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-cases
          path: test_cases/${{ inputs.jira_ticket }}.yaml
          if-no-files-found: ignore

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results/
          if-no-files-found: ignore

      - name: Upload Jira context artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jira-context
          path: jira_context/
          if-no-files-found: ignore

      - name: Commit results to repo
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "QA Bot"
          git config user.email "qa-bot@satudental.com"
          git add test_cases/ results/ || true
          git commit -m "QA: ${{ inputs.jira_ticket }} - ${DATE}" || echo "No changes to commit"
          git push || echo "Push failed"
